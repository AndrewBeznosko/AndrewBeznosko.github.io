<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Захищений документ</title>
<style>
  :root{ --bg:#f6f6f3; --surface:#ffffff; --text:#1c1c1a; --muted:#5f5e5a;
    --border:rgba(0,0,0,0.12); --blue:#2f6fb0; --red:#cf4b4b; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#17181a; --surface:#202225; --text:#ececea; --muted:#a3a29c;
      --border:rgba(255,255,255,0.14); --blue:#6ba6e0; --red:#ec8585; }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--text); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; padding:24px; }
  .card{ width:100%; max-width:380px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px 26px; box-shadow:0 1px 2px rgba(0,0,0,.05),0 8px 30px rgba(0,0,0,.08); text-align:center; }
  .lock{ font-size:34px; line-height:1; margin-bottom:10px; }
  h1{ font-size:18px; margin:0 0 6px; font-weight:650; }
  p{ margin:0 0 18px; color:var(--muted); font-size:14px; }
  form{ display:flex; gap:8px; }
  input{ flex:1; padding:11px 13px; font-size:16px; border:1px solid var(--border);
    border-radius:10px; background:var(--bg); color:var(--text); outline:none; }
  input:focus{ border-color:var(--blue); }
  button{ padding:11px 16px; font-size:15px; font-weight:600; border:none; border-radius:10px;
    background:var(--blue); color:#fff; cursor:pointer; }
  button:disabled{ opacity:.6; cursor:default; }
  .err{ color:var(--red); font-size:13px; min-height:18px; margin-top:12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>Документ захищено паролем</h1>
    <p>Введіть пароль, щоб переглянути дослідження.</p>
    <form id="f">
      <input id="pw" type="password" inputmode="numeric" autocomplete="off" autofocus placeholder="Пароль">
      <button id="b" type="submit">Відкрити</button>
    </form>
    <div class="err" id="e"></div>
  </div>

const dec = new TextDecoder();
const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const $ = (id) => document.getElementById(id);

async function unlock(password){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:fromB64(DATA.salt), iterations:DATA.iter, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:fromB64(DATA.iv) }, key, fromB64(DATA.ct));
  return dec.decode(buf);
}

$('f').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  $('e').textContent = '';
  $('b').disabled = true;
  try{
    const html = await unlock($('pw').value);
    // Render the decrypted document in an iframe so its own scripts run with a
    // normal lifecycle (DOMContentLoaded fires, Chart.js and the theme toggle
    // initialise) — document.write() would suppress them. The iframe is sized
    // to its full content height (scrolling=no) so the PARENT window does the
    // scrolling: native, reliable on mobile/iOS where in-iframe scroll is flaky.
    const frame = document.createElement('iframe');
    frame.title = 'Дослідження';
    frame.scrolling = 'no';
    frame.setAttribute('style', 'display:block;width:100%;border:0;margin:0;');
    frame.srcdoc = html;
    // fully reset the gate's body (it had padding + flex centering) so the
    // iframe spans the full viewport width, not the centered card column.
    document.documentElement.style.cssText = 'margin:0;padding:0;';
    document.body.style.cssText = 'margin:0;padding:0;display:block;';
    document.body.replaceChildren(frame);
    frame.addEventListener('load', () => {
      const idoc = frame.contentDocument, iwin = frame.contentWindow;
      const sync = () => { frame.style.height = idoc.documentElement.scrollHeight + 'px'; };
      sync();
      // keep height in sync as charts render, theme toggles, or device rotates
      try { new iwin.ResizeObserver(sync).observe(idoc.documentElement); } catch (e) {}
      iwin.addEventListener('resize', sync);
      [150, 400, 900, 1800, 3000].forEach(t => setTimeout(sync, t));
    });
  }catch(err){
    $('e').textContent = 'Невірний пароль';
    $('b').disabled = false;
    $('pw').select();
  }
});
</script>
